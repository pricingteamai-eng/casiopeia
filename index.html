<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Competitiveness Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .table-container { overflow-x: auto; margin-top: 1.5rem; max-height: 400px;}
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th, td { border: 1px solid #e5e7eb; padding: 0.75rem 0.5rem; text-align: left; }
        th { background-color: #f3f4f6; font-weight: 600; color: #374151; white-space: nowrap; position: sticky; top: 0; }
        tbody tr:nth-child(even) { background-color: #f9fafb; }
        tbody tr:hover { background-color: #e5edff; transition: 0.2s; }
        .draft-box {
            white-space: pre;
            overflow-x: auto;
            font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
            line-height: 1.5;
            height: 300px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            padding: 1rem;
            background-color: #f9fafb;
            color: #4b5563;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 text-gray-800">

    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <!-- Header -->
        <div class="border-b pb-4 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-blue-700 flex items-center gap-2">📊 AM Dashboard: Price Competitiveness</h1>
                <p class="text-gray-500 text-sm mt-1">Sistem Deteksi Pintar menggunakan Anchor "Competitive Flagging".</p>
            </div>
        </div>

        <!-- Upload & Action -->
        <div class="bg-blue-50 border border-blue-100 rounded-lg p-5 mb-6 grid grid-cols-1 md:grid-cols-3 gap-4 shadow-sm items-end">
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-1 text-blue-700">📂 Upload Data (.CSV/.XLSX)</label>
                <input type="file" id="fileInput" accept=".csv, .xlsx, .xls" class="w-full border border-gray-300 p-2 rounded bg-white text-sm cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200">
                <span id="fileStatus" class="text-xs text-red-500 font-medium mt-1 block">Belum ada file yang dipilih.</span>
            </div>
            <div>
                <button id="analyzeBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded shadow transition duration-200 flex items-center justify-center gap-2">
                    🔍 ANALYZE DATA
                </button>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultArea" class="hidden">
            <div class="mb-6 max-w-md">
                <label class="block text-sm font-semibold mb-1 text-gray-700">Pilih Properti Tidak Kompetitif:</label>
                <select id="propertySelect" class="w-full border border-gray-300 p-2.5 rounded-lg bg-white text-sm focus:ring-blue-500 focus:border-blue-500 shadow-sm">
                    <option value="">-- Pilih Hotel --</option>
                </select>
            </div>

            <div id="dashboardArea" class="hidden border rounded-xl bg-white shadow-sm overflow-hidden">
                <div class="bg-gray-50 border-b p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <h2 id="selectedHotelName" class="text-lg font-bold text-gray-800 leading-tight">Detail Kalah Saing</h2>
                        <p class="text-xs text-gray-500 mt-1">Data berdasarkan GH dan PE Log</p>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button id="copyEmailBtn" class="flex-1 md:flex-none bg-yellow-500 hover:bg-yellow-600 text-white text-xs font-bold py-2 px-4 rounded shadow transition flex items-center justify-center gap-1">
                            <span>📧</span> Copy Email
                        </button>
                        <button id="copyWABtn" class="flex-1 md:flex-none bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 px-4 rounded shadow transition flex items-center justify-center gap-1">
                            <span>💬</span> Copy WA
                        </button>
                    </div>
                </div>

                <div class="p-4">
                    <div class="table-container !mt-0 shadow-none border rounded-lg">
                        <table id="dashboardTable">
                            <thead>
                                <tr>
                                    <th>Day of Search</th>
                                    <th>Tanggal CI</th>
                                    <th>Status</th>
                                    <th>Platform</th>
                                    <th class="text-right">Harga Tiket</th>
                                    <th class="text-right">Harga Kompetitor</th>
                                    <th class="text-center">Selisih</th>
                                    <th>Deskripsi</th>
                                    <th>Kompetitor</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data inject -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let globalRawData = [];
        let analyzedProperties = {}; 

        // File Handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const statusText = document.getElementById('fileStatus');
            if (!file) { statusText.textContent = "Belum ada file yang dipilih."; statusText.className = "text-xs text-red-500 font-medium mt-1 block"; globalRawData = []; return; }
            statusText.textContent = "Membaca file..."; statusText.className = "text-xs text-orange-500 font-medium mt-1 block";

            const reader = new FileReader();
            reader.onload = e => {
                try {
                    let data = new Uint8Array(e.target.result);
                    let workbook = XLSX.read(data, {type: 'array'});
                    globalRawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
                    
                    if (globalRawData.length > 0 && Object.keys(globalRawData[0]).length <= 2) {
                        const textReader = new FileReader();
                        textReader.onload = function(evt) {
                            const text = evt.target.result;
                            const delim = text.includes('\t') ? '\t' : ','; 
                            Papa.parse(text, {
                                header: true,
                                skipEmptyLines: true,
                                delimiter: delim,
                                complete: res => {
                                    globalRawData = res.data;
                                    statusText.textContent = `✅ CSV/TSV File ready! (${globalRawData.length} baris)`; 
                                    statusText.className = "text-xs text-green-600 font-bold mt-1 block";
                                }
                            });
                        };
                        textReader.readAsText(file, 'UTF-16LE'); 
                        return;
                    }

                    statusText.textContent = `✅ Excel/CSV File ready! (${globalRawData.length} baris)`; 
                    statusText.className = "text-xs text-green-600 font-bold mt-1 block";
                } catch(err) {
                    statusText.textContent = "❌ Gagal membaca file. Pastikan format benar.";
                    statusText.className = "text-xs text-red-600 font-bold mt-1 block";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        const cleanNum = (str) => {
            if (!str) return 0;
            const num = parseFloat(String(str).replace(/,/g, '').replace(/%/g, '').trim());
            return isNaN(num) ? 0 : num;
        };

        // Analyze Data menggunakan Logika "Anchor" (Jangkar)
        document.getElementById('analyzeBtn').addEventListener('click', function() {
            if (globalRawData.length === 0) return alert("Silakan upload file data terlebih dahulu atau tunggu sampai status 'Ready'!");

            analyzedProperties = {};
            
            let keys = Object.keys(globalRawData[0]);
            let anchorIndex = keys.findIndex(k => String(k).trim().toLowerCase() === 'competitive flagging');
            
            if (anchorIndex === -1) {
                alert("Error: Kolom 'Competitive Flagging' tidak ditemukan. Pastikan format file sesuai.");
                return;
            }

            const metricColName = keys[anchorIndex + 1];
            const dateColumns = keys.slice(anchorIndex + 2).filter(k => String(k).trim() !== '');

            // Grouping Logic
            let tempGroup = {};
            globalRawData.forEach(row => {
                let propKey = Object.keys(row).find(k => k.toLowerCase().includes('property name'));
                const propName = propKey ? row[propKey] : null;
                if (!propName || String(propName).trim() === '') return;
                
                const metricValue = String(row[metricColName] || '').trim();
                
                if (!tempGroup[propName]) {
                    tempGroup[propName] = { 
                        ghCompetitor: 'N/A',
                        peVendor: 'N/A',
                        dayOfSearch: 'N/A',
                        flagging: 'N/A',
                        nativeRates: {}, peRates: {}, ghRates: {} 
                    };
                }

                // Get Day of Search
                let dosKey = Object.keys(row).find(k => k.toLowerCase().includes('day of search'));
                if (dosKey && row[dosKey]) tempGroup[propName].dayOfSearch = row[dosKey];

                // Get Flagging
                let flagKey = keys[anchorIndex];
                if (flagKey && row[flagKey]) tempGroup[propName].flagging = row[flagKey];

                let ghCompKey = Object.keys(row).find(k => k.toLowerCase().includes('google hotel cheapest') && !k.toLowerCase().includes('price') && !k.toLowerCase().includes('rate'));
                let peVendKey = Object.keys(row).find(k => k.toLowerCase().includes('pe log cheapest') && !k.toLowerCase().includes('price') && !k.toLowerCase().includes('rate'));

                if (ghCompKey && row[ghCompKey] && String(row[ghCompKey]).trim() !== '') {
                    tempGroup[propName].ghCompetitor = row[ghCompKey];
                }
                if (peVendKey && row[peVendKey] && String(row[peVendKey]).trim() !== '') {
                    tempGroup[propName].peVendor = row[peVendKey];
                }

                if (metricValue.toLowerCase().includes('native') && metricValue.toLowerCase().includes('price')) {
                    dateColumns.forEach(d => { if (cleanNum(row[d]) > 0) tempGroup[propName].nativeRates[d] = cleanNum(row[d]); });
                } else if (metricValue.toLowerCase().includes('pe log') && metricValue.toLowerCase().includes('price')) {
                    dateColumns.forEach(d => { if (cleanNum(row[d]) > 0) tempGroup[propName].peRates[d] = cleanNum(row[d]); });
                } else if (metricValue.toLowerCase().includes('google hotel') && metricValue.toLowerCase().includes('price')) {
                    dateColumns.forEach(d => { if (cleanNum(row[d]) > 0) tempGroup[propName].ghRates[d] = cleanNum(row[d]); });
                }
            });

            // Compare Rates
            Object.keys(tempGroup).forEach(prop => {
                const data = tempGroup[prop];
                let kalahGH = [];
                let kalahPE = [];
                let details = [];

                dateColumns.forEach(date => {
                    const native = data.nativeRates[date];
                    const gh = data.ghRates[date];
                    const pe = data.peRates[date];

                    if (native > 0) {
                        if (gh > 0 && native > gh) {
                            kalahGH.push(date);
                            details.push({ tgl: date, platform: "Google Hotel", native: native, compRate: gh, compName: data.ghCompetitor });
                        }
                        if (pe > 0 && native > pe) {
                            kalahPE.push(date);
                            details.push({ tgl: date, platform: "PE Log", native: native, compRate: pe, compName: data.peVendor });
                        }
                    }
                });

                if (kalahGH.length > 0 || kalahPE.length > 0) {
                    analyzedProperties[prop] = {
                        kalahGH_dates: kalahGH,
                        kalahPE_dates: kalahPE,
                        details: details,
                        ghCompetitor: data.ghCompetitor,
                        peVendor: data.peVendor,
                        dayOfSearch: data.dayOfSearch,
                        flagging: data.flagging
                    };
                }
            });

            // Render Dropdown
            const propertySelect = document.getElementById('propertySelect');
            propertySelect.innerHTML = '<option value="">-- Pilih Hotel --</option>';
            
            let sortedProps = Object.keys(analyzedProperties).sort((a, b) => {
                const totalA = analyzedProperties[a].kalahGH_dates.length + analyzedProperties[a].kalahPE_dates.length;
                const totalB = analyzedProperties[b].kalahGH_dates.length + analyzedProperties[b].kalahPE_dates.length;
                return totalB - totalA;
            });

            if(sortedProps.length === 0) {
                alert("Tidak ada properti yang kalah saing harga.");
            } else {
                sortedProps.forEach(prop => {
                    let opt = document.createElement('option');
                    opt.value = prop;
                    opt.textContent = prop;
                    propertySelect.appendChild(opt);
                });
            }

            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('dashboardArea').classList.add('hidden');
        });

        // Dropdown Event Listener
        document.getElementById('propertySelect').addEventListener('change', function(e) {
            const propName = e.target.value;
            if (!propName) {
                document.getElementById('dashboardArea').classList.add('hidden');
                return;
            }
            renderDashboard(propName);
        });

        function renderDashboard(propName) {
            const data = analyzedProperties[propName];
            const fmt = (num) => new Intl.NumberFormat('id-ID').format(num);

            document.getElementById('selectedHotelName').textContent = propName;
            
            let tbody = document.querySelector('#dashboardTable tbody');
            tbody.innerHTML = '';

            data.details.forEach(item => {
                const diffValue = item.native - item.compRate;
                const diffPct = ((diffValue / item.native) * 100).toFixed(1);

                // Description Logic
                const deskripsi = `Harga Native (${fmt(item.native)}) lebih mahal dari ${item.platform} (${fmt(item.compRate)})`;

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="whitespace-nowrap text-gray-500">${data.dayOfSearch}</td>
                    <td class="whitespace-nowrap font-medium">${item.tgl}</td>
                    <td><span class="px-2 py-0.5 rounded text-[10px] font-bold ${data.flagging.toLowerCase().includes('not') ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${data.flagging}</span></td>
                    <td><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${item.platform === 'Google Hotel' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}">${item.platform}</span></td>
                    <td class="text-right font-semibold">${fmt(item.native)}</td>
                    <td class="text-right text-red-600 font-semibold">${fmt(item.compRate)}</td>
                    <td class="text-center"><span class="text-red-700 font-bold">-${diffPct}%</span></td>
                    <td class="text-xs text-gray-600 italic">${deskripsi}</td>
                    <td class="text-gray-600 text-xs">${item.compName}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('dashboardArea').classList.remove('hidden');

            // Update Copy Buttons
            const drafts = generateDrafts(propName);
            document.getElementById('copyEmailBtn').onclick = () => copyToClipboard(drafts.email, 'Email');
            document.getElementById('copyWABtn').onclick = () => copyToClipboard(drafts.wa, 'WhatsApp');
        }

        function generateDrafts(propName) {
            const data = analyzedProperties[propName];
            let platformKalah = new Set();
            let competitorWA = "";
            const fmt = (num) => new Intl.NumberFormat('id-ID').format(num);

            let textTable = "Tanggal Check-in | Platform     | Harga Tiket | Harga Kompetitor | Kompetitor\n";
            textTable += "--------------------------------------------------------------------------------------\n";
            
            data.details.forEach(item => {
                platformKalah.add(item.platform);
                if (!competitorWA || competitorWA === 'N/A') competitorWA = item.compName;
                let padTgl = String(item.tgl).padEnd(16, ' ');
                let padPlat = String(item.platform).padEnd(12, ' ');
                let padNative = fmt(item.native).padStart(11, ' ');
                let padCompRate = fmt(item.compRate).padStart(16, ' ');
                textTable += `${padTgl} | ${padPlat} | ${padNative} | ${padCompRate} | ${item.compName}\n`;
            });

            const platformString = Array.from(platformKalah).join(' & ');

            return {
                email: `Subjek: [PENTING] Update Kompetisi Harga & Potensi Kehilangan Booking - ${propName}\nKepada: Tim Reservasi / Revenue ${propName}\n\nSemoga email ini mendapati Anda dalam keadaan baik.\n\nBersama email ini, kami dari tim Akomodasi tiket.com ingin menginformasikan bahwa berdasarkan pantauan sistem rutin kami, harga ${propName} saat ini terpantau kurang kompetitif dibandingkan dengan penawaran kompetitor.\n\nBerikut adalah detail pantauan sistem kami:\n\n${textTable}\nKondisi harga yang tidak kompetitif ini dapat menurunkan visibilitas properti Anda secara signifikan dan berdampak langsung pada turunnya konversi pemesanan (booking) dari tamu.\n\nKami sangat menyarankan Bapak/Ibu untuk segera melakukan penyesuaian rate atau mempertimbangkan untuk mengaktifkan tactical promo khusus untuk rentang tanggal di atas agar harga di tiket.com kembali kompetitif.\n\nJika membutuhkan diskusi lebih lanjut terkait strategi pricing, silakan balas email ini.\n\nSalam hangat,\n\nAccount Manager, Accommodation\ntiket.com`,
                wa: `Halo Tim ${propName}! 👋 Saya Account Manager dari tiket.com. \n\nIngin info singkat saja kalau harga properti Bapak/Ibu saat ini sedang kalah saing di *${platformString}* (vs ${competitorWA}) untuk beberapa tanggal check-in. \n\nDetail lengkap tanggalnya baru saja saya kirimkan ke email ya. Yuk kita review rate-nya bareng supaya visibilitas dan booking-an hotel Bapak/Ibu bisa naik lagi di tiket.com! Boleh kabari saya kalau emailnya sudah dicek ya. Terima kasih! 🙏`
            };
        }

        function copyToClipboard(text, type) {
            navigator.clipboard.writeText(text).then(() => {
                alert(`Draft ${type} berhasil disalin ke Clipboard!`);
            }).catch(err => {
                alert('Gagal menyalin teks: ', err);
            });
        }
    </script>
</body>
</html>
